<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProAlto - Admin Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fec05c;
            /* ProAlto Gold */
            --primary-dark: #283e52;
            /* ProAlto Dark Blue */
            --primary-light: #fffbeb;
            --bg-color: #f8fafc;
            --text-main: #020817;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bot-bubble: #ffffff;
            --user-bubble: #f1f5f9;
            --agent-bubble: #fff8e1;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 8px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar - Conversation List */
        .sidebar {
            width: 350px;
            background: #FFFFFF;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .sidebar-header {
            padding: 24px 16px;
            background: var(--primary-dark);
            color: white;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar-header h2 {
            font-size: 1.25rem;
            margin-bottom: 4px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .sidebar-header p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-bottom: 10px;
        }

        .search-container {
            padding: 0 10px;
            margin-bottom: 5px;
        }

        .search-container input {
            width: 100%;
            padding: 8px 12px;
            border-radius: 5px;
            border: none;
            outline: none;
            font-size: 0.9rem;
        }

        .tab-buttons {
            display: flex;
            border-top: 1px solid rgba(255, 255, 255, 0.2);
            margin-top: 5px;
        }

        .tab-btn {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 0.82rem;
            font-weight: 600;
            transition: all 0.2s;
        }

        .tab-btn.active-tab {
            color: white;
            border-bottom: 2px solid white;
        }

        .tab-btn:hover {
            color: white;
        }

        .archived-badge {
            display: inline-block;
            background: #888;
            color: white;
            border-radius: 10px;
            padding: 2px 6px;
            font-size: 0.72rem;
            font-weight: bold;
        }

        .conversation-list {
            flex: 1;
            overflow-y: auto;
        }

        .conv-item {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .conv-item:hover {
            background: #f1f5f9;
        }

        .conv-item.active {
            background: #f1f5f9;
            box-shadow: inset 4px 0 0 var(--primary);
        }

        .conv-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .conv-phone {
            font-weight: 600;
        }

        .conv-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .conv-status {
            font-size: 0.75rem;
            padding: 2px 6px;
            border-radius: 10px;
            font-weight: bold;
        }

        .status-bot {
            background: #EAEAEA;
            color: #555;
        }

        .status-agent {
            background: var(--danger);
            color: white;
            animation: pulse 2s infinite;
        }

        .conv-preview {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Main Area - Chat View */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #EFEFEF;
        }

        .chat-header {
            padding: 15px 30px;
            background: #FFFFFF;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .empty-state {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            color: var(--text-muted);
        }

        /* Actions */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--primary-dark);
        }

        .btn-primary:hover {
            background: #eeb14e;
            transform: translateY(-1px);
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-outline-danger {
            background: transparent;
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-outline-danger:hover {
            background: #fef2f2;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #f9f9f9;
            min-width: 200px;
            box-shadow: 0px 8px 16px 0px rgba(0, 0, 0, 0.2);
            z-index: 10;
            border-radius: 5px;
            overflow: hidden;
        }

        .dropdown-content a {
            color: black;
            padding: 12px 16px;
            text-decoration: none;
            display: block;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .dropdown-content a:hover {
            background-color: #f1f1f1;
        }

        .dropdown:hover .dropdown-content {
            display: block;
        }

        .btn:hover {
            opacity: 0.8;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-primary {
            background: var(--primary);
            color: var(--primary-dark);
        }

        /* Messages */
        .chat-history {
            flex: 1;
            padding: 20px 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');
            background-size: contain;
        }

        .message {
            max-width: 65%;
            padding: 10px 15px;
            border-radius: 8px;
            box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
            position: relative;
            line-height: 1.4;
        }

        .msg-inbound {
            align-self: flex-start;
            background: var(--bot-bubble);
            border-top-left-radius: 0;
        }

        .msg-outbound {
            align-self: flex-end;
            background: var(--user-bubble);
            border-top-right-radius: 0;
        }

        .msg-outbound.msg-agent {
            background: var(--agent-bubble);
        }

        .msg-meta {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
            margin-top: 5px;
        }

        /* Input Area */
        .chat-input-area {
            padding: 20px 30px;
            background: #F0F0F0;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .chat-input-area textarea {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid var(--border);
            border-radius: 12px;
            outline: none;
            font-size: 0.95rem;
            background: white;
            transition: border-color 0.2s;
            resize: none;
            height: 48px;
            min-height: 48px;
            max-height: 150px;
            line-height: 1.4;
        }

        .chat-input-area textarea:focus {
            border-color: var(--primary);
        }

        .chat-input-area textarea:disabled {
            background: #E0E0E0;
            cursor: not-allowed;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.7;
            }

            100% {
                opacity: 1;
            }
        }

        .hidden {
            display: none !important;
        }

        /* Advisor Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 25px;
            border-radius: 10px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .modal-content h3 {
            margin-bottom: 20px;
            color: var(--primary);
        }

        .modal-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .modal-form select,
        .modal-form input {
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 5px;
            font-size: 1rem;
        }

        .modal-footer {
            margin-top: 20px;
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }
    </style>
</head>

<body>

    <!-- Sidebar -->
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="https://proalto.co/logo.png" alt="ProAlto Logo"
                style="height: 40px; margin-bottom: 12px; filter: brightness(0) invert(1);">
            <h2>Monitor Admin</h2>
            <p>Panel de Conversaciones</p>
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Buscar teléfono..." oninput="filterList()">
            </div>
            <div class="tab-buttons">
                <button class="tab-btn active-tab" id="tabActivas" onclick="switchTab('activas')">Activas</button>
                <button class="tab-btn" id="tabArchivadas" onclick="switchTab('archivadas')">Archivadas</button>
            </div>
        </div>
        <div class="conversation-list" id="convList">
            <!-- Loading -->
            <div style="padding: 20px; text-align: center; color: #777;">Cargando...</div>
        </div>
    </div>

    <!-- Main Chat -->
    <div class="main-chat" id="mainChat" style="display: none;">
        <div class="chat-header">
            <div>
                <h3 id="currentPhone">+57 000 0000 000</h3>
                <span id="currentStatusIndicator" class="conv-status"></span>
            </div>
            <div style="display: flex; gap: 8px; align-items: center;">
                <button id="btnExport" class="btn btn-primary" onclick="exportConversation()"
                    title="Exportar a Texto">📤 Exportar</button>
                <button id="btnRestore" class="btn btn-primary hidden" onclick="restoreChat()">Restaurar al
                    Panel</button>
                <button id="btnForceAgent" class="btn btn-primary hidden" onclick="forceAgentSession()">Tomar
                    Control</button>
                <div class="dropdown" id="dropdownDelete">
                    <button class="btn btn-outline-danger">Eliminar ▼</button>
                    <div class="dropdown-content">
                        <a onclick="deleteChat(false)">Ocultar de la lista (Guardar en BD)</a>
                        <a onclick="deleteChat(true)" style="color: red; font-weight: bold;">Borrar permanentemente</a>
                    </div>
                </div>
                <button id="btnCloseAgent" class="btn btn-danger hidden" onclick="closeAgentSession()">Terminar
                    Intervención</button>
            </div>
        </div>

        <div class="chat-history" id="chatHistory">
            <!-- Messages go here -->
        </div>

        <div class="chat-input-area" id="chatInputArea">
            <textarea id="msgInput" placeholder="Escribe un mensaje al cliente... (Solo funciona en modo Asesor)"
                disabled onkeydown="handleKeyPress(event)"></textarea>
            <button class="btn btn-primary" id="btnSend" disabled onclick="sendMessage()"
                style="height: 48px; align-self: flex-end;">Enviar</button>
        </div>
    </div>

    <!-- Empty State -->
    <div class="main-chat" id="emptyState">
        <div class="empty-state">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            <h2 style="margin-top: 15px; color: #888;">Selecciona una conversación</h2>
        </div>
    </div>

    <!-- Advisor Selection Modal -->
    <div id="advisorModal" class="modal-overlay hidden">
        <div class="modal-content">
            <h3>¿Quién está atendiendo?</h3>
            <div class="modal-form">
                <p style="font-size: 0.9rem; color: #666;">Selecciona tu nombre para identificarte ante el cliente:</p>
                <select id="advisorSelect" onchange="toggleCustomAdvisor()">
                    <option value="">-- Seleccionar --</option>
                    <option value="Carol">Carol</option>
                    <option value="Angie">Angie</option>
                    <option value="Yulaidis">Yulaidis</option>
                    <option value="Carlos">Carlos</option>
                    <option value="Breyner">Breyner</option>
                    <option value="otro">Otro (Escribir...)</option>
                </select>
                <input type="text" id="customAdvisor" placeholder="Escribe tu nombre..." class="hidden">
            </div>
            <div class="modal-footer">
                <button class="btn btn-primary" onclick="confirmAdvisor()">Continuar</button>
            </div>
        </div>
    </div>

    <script>
        let currentActivePhone = null;
        let lastFetchTime = 0;
        let knownAgentModes = {};
        let currentTab = 'activas'; // 'activas' | 'archivadas'
        let advisorName = localStorage.getItem('proalto_advisor_name');

        function toggleCustomAdvisor() {
            const select = document.getElementById('advisorSelect');
            const custom = document.getElementById('customAdvisor');
            if (select.value === 'otro') {
                custom.classList.remove('hidden');
            } else {
                custom.classList.add('hidden');
            }
        }

        function showAdvisorModal(callback) {
            const modal = document.getElementById('advisorModal');
            modal.classList.remove('hidden');
            window.pendingAdvisorCallback = callback;
        }

        function confirmAdvisor() {
            const select = document.getElementById('advisorSelect');
            const customInput = document.getElementById('customAdvisor');
            let name = select.value;
            if (name === 'otro') name = customInput.value.trim();

            if (!name) {
                alert('Por favor selecciona o escribe tu nombre');
                return;
            }

            advisorName = name;
            localStorage.setItem('proalto_advisor_name', name);
            document.getElementById('advisorModal').classList.add('hidden');

            if (window.pendingAdvisorCallback) {
                const cb = window.pendingAdvisorCallback;
                window.pendingAdvisorCallback = null;
                cb();
            }
        }

        function switchTab(tab) {
            currentTab = tab;
            currentActivePhone = null;
            document.getElementById('emptyState').style.display = 'flex';
            document.getElementById('mainChat').style.display = 'none';

            // Update tab styles
            document.getElementById('tabActivas').classList.toggle('active-tab', tab === 'activas');
            document.getElementById('tabArchivadas').classList.toggle('active-tab', tab === 'archivadas');

            if (tab === 'activas') {
                fetchList();
            } else {
                fetchArchivedList();
            }
        }

        async function fetchArchivedList() {
            try {
                const res = await fetch('/admin/api/archived-conversations');
                const data = await res.json();
                renderArchivedList(data);
            } catch (err) {
                console.error('Error fetching archived:', err);
            }
        }

        function renderArchivedList(conversations) {
            const listEl = document.getElementById('convList');
            if (conversations.length === 0) {
                listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #777;">No hay conversaciones archivadas</div>';
                return;
            }
            let html = '';
            conversations.forEach(c => {
                const activeClass = currentActivePhone === c.phone ? 'active' : '';
                html += `
                    <div class="conv-item ${activeClass}" id="conv-item-${c.phone}" onclick="selectConversation('${c.phone}')">
                        <div class="conv-header">
                            <span class="conv-phone">${c.phone}</span>
                            <span class="conv-time">${formatTime(c.updated_at)}</span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
                            <span class="conv-preview">${c.last_message || '...'}</span>
                            <span class="archived-badge">ARCHIVADA</span>
                        </div>
                    </div>
                `;
            });
            listEl.innerHTML = html;
            filterList();
        }

        async function restoreChat() {
            if (!currentActivePhone) return;
            if (!confirm('¿Restaurar esta conversación a la lista activa del panel?')) return;
            try {
                const res = await fetch(`/admin/api/restore-chat/${currentActivePhone}`, { method: 'POST' });
                if (res.ok) {
                    currentActivePhone = null;
                    document.getElementById('emptyState').style.display = 'flex';
                    document.getElementById('mainChat').style.display = 'none';
                    fetchArchivedList();
                }
            } catch (e) {
                console.error(e);
            }
        }


        function playBeep() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                const current = ctx.currentTime;
                // Double chime
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.connect(gain);
                gain.connect(ctx.destination);
                osc.type = 'sine';

                // First chime
                osc.frequency.setValueAtTime(880, current);
                gain.gain.setValueAtTime(0.3, current);
                gain.gain.exponentialRampToValueAtTime(0.01, current + 0.2);

                // Second chime
                osc.frequency.setValueAtTime(1046, current + 0.2);
                gain.gain.setValueAtTime(0.3, current + 0.2);
                gain.gain.exponentialRampToValueAtTime(0.01, current + 0.5);

                osc.start(current);
                osc.stop(current + 0.5);
            } catch (e) {
                console.error("Audio beep failed", e);
            }
        }

        function formatTime(isoString) {
            if (!isoString) return "";
            const date = new Date(isoString);
            return date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' - ' + date.toLocaleDateString();
        }

        function scrollToBottom() {
            const h = document.getElementById('chatHistory');
            h.scrollTop = h.scrollHeight;
        }

        async function fetchList() {
            try {
                const res = await fetch('/admin/api/conversations');
                const data = await res.json();
                renderList(data);
            } catch (err) {
                console.error("Error fetching list:", err);
            }
        }

        function renderList(conversations) {
            const listEl = document.getElementById('convList');
            if (conversations.length === 0) {
                listEl.innerHTML = '<div style="padding: 20px; text-align: center; color: #777;">No hay conversaciones registradas</div>';
                return;
            }

            // Save scroll pos
            const scrollPos = listEl.scrollTop;

            let html = '';
            let newAgentDetected = false;

            conversations.forEach(c => {
                const statusClass = c.status === 'agent' ? 'status-agent' : 'status-bot';
                const statusLabel = c.status === 'agent' ? '🔴 ASESOR' : 'BOT';
                const activeClass = currentActivePhone === c.phone ? 'active' : '';

                // Notification Logic
                if (c.status === 'agent' && !knownAgentModes[c.phone]) {
                    // Only beep if the object was already populated (not on initial load spam)
                    if (Object.keys(knownAgentModes).length > 0) {
                        newAgentDetected = true;
                    }
                    knownAgentModes[c.phone] = true;
                } else if (c.status !== 'agent' && knownAgentModes[c.phone]) {
                    knownAgentModes[c.phone] = false;
                }

                html += `
    <div class="conv-item ${activeClass}" id="conv-item-${c.phone}" onclick="selectConversation('${c.phone}')">
        <div class="conv-header">
            <span class="conv-phone">${c.phone}</span>
            <span class="conv-time">${formatTime(c.updated_at)}</span>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 5px;">
            <span class="conv-preview">${c.last_message || '...'}</span>
            <span class="conv-status ${statusClass}">${statusLabel}</span>
        </div>
    </div>
    `;
            });
            listEl.innerHTML = html;
            listEl.scrollTop = scrollPos;

            if (newAgentDetected) {
                playBeep();
            }

            filterList(); // Re-apply filter if any
        }

        function filterList() {
            const val = document.getElementById('searchInput').value.toLowerCase();
            const items = document.querySelectorAll('.conv-item');
            items.forEach(item => {
                const phone = item.querySelector('.conv-phone').innerText.toLowerCase();
                if (phone.includes(val)) {
                    item.style.display = 'flex';
                } else {
                    item.style.display = 'none';
                }
            });
        }

        async function selectConversation(phone) {
            currentActivePhone = phone;
            document.getElementById('emptyState').style.display = 'none';
            document.getElementById('mainChat').style.display = 'flex';
            document.getElementById('currentPhone').innerText = phone;

            // Re-render list to show active state
            await fetchList();

            // Fetch history (force scroll to bottom on initial select)
            await fetchHistory(phone, true);
        }

        async function fetchHistory(phone, forceScroll = false) {
            if (!phone) return;
            try {
                const res = await fetch(`/admin/api/conversations/${phone}`);
                const data = await res.json();

                const historyEl = document.getElementById('chatHistory');

                // --- SMART SCROLL LOGIC ---
                // Detect if user is at the bottom before rendering
                const isAtBottom = historyEl.scrollHeight - historyEl.scrollTop - historyEl.clientHeight < 100;
                const oldScrollTop = historyEl.scrollTop;

                let html = '';

                data.messages.forEach(m => {
                    const isOut = m.direction === 'outbound';
                    const isAgentMsg = isOut && m.text.includes('Asesor ProAlto');

                    let classes = `message ${isOut ? 'msg-outbound' : 'msg-inbound'}`;
                    if (isAgentMsg) classes += ' msg-agent';

                    // Basic formatting
                    let text = m.text.replace(/\n/g, '<br>');

                    html += `
    <div class="${classes}">
        <div>${text}</div>
        <div class="msg-meta">${formatTime(m.timestamp)}</div>
    </div>
    `;
                });

                // Only update if content changed OR if it's the first load
                // This prevents losing scroll position/flicker on every poll
                if (historyEl.innerHTML !== html || forceScroll) {
                    historyEl.innerHTML = html;

                    if (forceScroll || isAtBottom) {
                        scrollToBottom();
                    } else {
                        // Keep the scroll exactly where it was
                        historyEl.scrollTop = oldScrollTop;
                    }
                }

                // Update UI based on status
                updateInputState(data.status);

            } catch (err) {
                console.error("Error fetching history:", err);
            }
        }

        function updateInputState(status) {
            const isArchived = currentTab === 'archivadas';
            const isAgent = status === 'agent' && !isArchived;

            document.getElementById('msgInput').disabled = !isAgent;
            document.getElementById('btnSend').disabled = !isAgent;

            const btnClose = document.getElementById('btnCloseAgent');
            const btnForce = document.getElementById('btnForceAgent');
            const btnRestore = document.getElementById('btnRestore');
            const dropdown = document.getElementById('dropdownDelete');
            const ind = document.getElementById('currentStatusIndicator');

            if (isArchived) {
                // Archived view: show Restore, hide all bot/agent controls
                btnRestore.classList.remove('hidden');
                btnForce.classList.add('hidden');
                btnClose.classList.add('hidden');
                dropdown.classList.add('hidden');
                ind.className = 'conv-status';
                ind.style.background = '#888';
                ind.style.color = 'white';
                ind.innerText = 'ARCHIVADA';
                document.getElementById('msgInput').placeholder = 'Solo lectura. Restaura la conversación para interactuar.';
            } else if (isAgent) {
                btnRestore.classList.add('hidden');
                btnClose.classList.remove('hidden');
                btnForce.classList.add('hidden');
                dropdown.classList.remove('hidden');
                ind.className = 'conv-status status-agent';
                ind.style = '';
                ind.innerText = '🔴 ESPERANDO ASESOR';
                document.getElementById('msgInput').placeholder = 'Modo Asesor Activo. Escribe acá tu respuesta...';
            } else {
                btnRestore.classList.add('hidden');
                btnClose.classList.add('hidden');
                btnForce.classList.remove('hidden');
                dropdown.classList.remove('hidden');
                ind.className = 'conv-status status-bot';
                ind.style = '';
                ind.innerText = 'CONTROLADO POR BOT';
                document.getElementById('msgInput').placeholder = 'Solo puedes escribir si tomas el control (ver botón arriba)';
            }
        }


        async function sendMessage() {
            if (!currentActivePhone) return;
            if (!advisorName) {
                showAdvisorModal(sendMessage);
                return;
            }

            const input = document.getElementById('msgInput');
            const text = input.value.trim();
            if (!text) return;

            input.disabled = true;
            document.getElementById('btnSend').disabled = true;

            try {
                const res = await fetch('/admin/api/send', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: currentActivePhone,
                        text: text,
                        advisor_name: advisorName
                    })
                });

                if (res.ok) {
                    input.value = '';
                    await fetchHistory(currentActivePhone);
                    await fetchList();
                } else {
                    alert('Error al enviar el mensaje');
                }
            } catch (e) {
                console.error(e);
                alert('Error de conexión');
            } finally {
                input.disabled = false;
                document.getElementById('btnSend').disabled = false;
                input.focus();
            }
        }

        async function forceAgentSession() {
            if (!currentActivePhone) return;
            if (!advisorName) {
                showAdvisorModal(forceAgentSession);
                return;
            }
            if (!confirm('¿Seguro quieres interrumpir al bot y tomar el control de la conversación?')) return;

            try {
                const res = await fetch(`/admin/api/force-agent/${currentActivePhone}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ advisor_name: advisorName })
                });
                if (res.ok) {
                    await fetchHistory(currentActivePhone);
                    await fetchList();
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function closeAgentSession() {
            if (!currentActivePhone) return;
            if (!confirm('¿Seguro quieres terminar la intervención y devolver el control al bot?')) return;

            try {
                const res = await fetch(`/admin/api/close-agent/${currentActivePhone}`, {
                    method: 'POST'
                });
                if (res.ok) {
                    await fetchHistory(currentActivePhone);
                    await fetchList();
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function deleteChat(permanent) {
            if (!currentActivePhone) return;

            const msg = permanent
                ? 'ATENCIÓN: ¿Seguro quieres eliminar este chat de la base de datos permanentemente? No se puede deshacer.'
                : '¿Seguro quieres ocultar este chat de tu panel? Se mantendrá en la base de datos por si lo necesitas.';

            if (!confirm(msg)) return;

            try {
                const res = await fetch(`/admin/api/delete-chat/${currentActivePhone}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ permanent: permanent })
                });

                if (res.ok) {
                    currentActivePhone = null;
                    document.getElementById('emptyState').style.display = 'flex';
                    document.getElementById('mainChat').style.display = 'none';
                    await fetchList();
                }
            } catch (e) {
                console.error(e);
            }
        }

        async function exportConversation() {
            if (!currentActivePhone) return;
            const btn = document.getElementById('btnExport');
            const originalText = btn.innerHTML;

            try {
                btn.innerHTML = '⌛ Generando...';
                btn.disabled = true;

                const res = await fetch(`/admin/api/conversations/${currentActivePhone}`);
                const data = await res.json();

                let content = `========================================================\n`;
                content += `      REPORTE DE CONVERSACIÓN - PROALTO BOT\n`;
                content += `========================================================\n`;
                content += `TELÉFONO: ${currentActivePhone}\n`;
                content += `ESTADO ACTUAL: ${data.status.toUpperCase()}\n`;
                content += `FECHA DE EXPORTACIÓN: ${new Date().toLocaleString()}\n`;
                content += `--------------------------------------------------------\n\n`;

                if (!data.messages || data.messages.length === 0) {
                    content += `(No hay mensajes en esta conversación)\n`;
                } else {
                    data.messages.forEach(m => {
                        const time = new Date(m.timestamp).toLocaleString();
                        const isOut = m.direction === 'outbound';
                        let sender = isOut ? 'BOT/SISTEMA' : 'CLIENTE';

                        // Detectar si es un asesor por el prefijo que usamos
                        if (isOut && m.text.includes('Asesor ProAlto')) {
                            sender = 'ASESOR HUMANO';
                        }

                        content += `[${time}] ${sender}:\n`;
                        content += `${m.text}\n`;
                        content += `--------------------------------------------------------\n`;
                    });
                }

                content += `\nFin del reporte.\nGenerado por ProAlto Admin Dashboard.`;

                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `Conversacion_ProAlto_${currentActivePhone}.txt`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);

            } catch (err) {
                console.error("Error exporting:", err);
                alert("Hubo un problema al exportar la conversación. Por favor intenta de nuevo.");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        }

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); // Prevenir el salto de línea por defecto
                sendMessage();
            }
            // Si es Shift + Enter, el navegador hará el salto de línea normalmente

            // Auto-resize textarea
            const target = e.target;
            target.style.height = '48px';
            target.style.height = (target.scrollHeight) + 'px';
        }

        // Auto polling
        setInterval(async () => {
            await fetchList();
            if (currentActivePhone) {
                await fetchHistory(currentActivePhone, false); // false = don't force scroll
            }
        }, 5000);

        // Initial fetch
        fetchList();
    </script>
</body>

</html>
