<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ProAlto - Revisión de pruebas del bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fec05c;
            --primary-dark: #283e52;
            --primary-light: #fffbeb;
            --bg-color: #f8fafc;
            --text-main: #020817;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --bot-bubble: #ffffff;
            --user-bubble: #e6f4ea;
            --client-llm-bubble: #dbeafe;
            --notice-bubble: #fff8e1;
            --danger: #ef4444;
            --success: #22c55e;
            --warning: #f59e0b;
            --radius: 10px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0;
            font-family: 'Outfit', ui-sans-serif, system-ui, sans-serif; }

        body { background: var(--bg-color); color: var(--text-main); min-height: 100vh; }

        header {
            background: linear-gradient(160deg, #283e52 0%, #1e3044 100%);
            color: white; padding: 14px 24px;
            display: flex; align-items: center; justify-content: space-between;
            border-bottom: 2px solid rgba(254, 192, 92, 0.35);
        }
        header h1 { font-size: 18px; font-weight: 600; }
        header a {
            color: var(--primary); font-size: 13px; text-decoration: none;
            border: 1px solid rgba(254, 192, 92, 0.45);
            padding: 5px 12px; border-radius: 999px;
        }
        header a:hover { background: rgba(254, 192, 92, 0.15); }

        main {
            max-width: 1400px; margin: 0 auto; padding: 20px;
            display: grid; grid-template-columns: 1fr; gap: 16px;
        }

        .toolbar {
            background: white; border: 1px solid var(--border); border-radius: var(--radius);
            padding: 14px 16px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
        }
        .toolbar label { font-size: 12.5px; color: var(--text-muted); font-weight: 500; }
        .toolbar select, .toolbar input {
            padding: 7px 10px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 13px; background: white; font-family: inherit;
        }
        .toolbar button {
            padding: 7px 14px; border: 1px solid var(--border); border-radius: 6px;
            background: white; cursor: pointer; font-size: 13px; font-weight: 500;
        }
        .toolbar button:hover { background: var(--primary-light); border-color: var(--primary); }
        .toolbar button.primary {
            background: var(--primary-dark); color: white; border-color: var(--primary-dark);
        }
        .toolbar button.primary:hover { background: #1e3044; }
        .toolbar button:disabled { opacity: 0.5; cursor: not-allowed; }

        .sessions-table {
            background: white; border: 1px solid var(--border); border-radius: var(--radius);
            overflow: hidden;
        }
        table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
        thead { background: #f1f5f9; }
        th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-weight: 600; color: var(--text-muted); font-size: 12px;
             text-transform: uppercase; letter-spacing: 0.5px; }
        tr.row { cursor: pointer; transition: background 0.1s; }
        tr.row:hover { background: var(--primary-light); }
        td.truncate { max-width: 240px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tag-pill {
            display: inline-block; padding: 2px 8px; border-radius: 999px;
            font-size: 11px; font-weight: 600; text-transform: uppercase;
        }
        .tag-ok { background: #dcfce7; color: #166534; }
        .tag-fail { background: #fee2e2; color: #991b1b; }
        .tag-review { background: #fef3c7; color: #92400e; }
        .signal-pill {
            display: inline-block; padding: 1px 7px; border-radius: 6px; margin-right: 4px;
            font-size: 11px; background: #ede9fe; color: #5b21b6;
        }

        /* Drawer */
        .drawer-overlay {
            position: fixed; inset: 0; background: rgba(2, 8, 23, 0.4);
            display: none; z-index: 50;
        }
        .drawer-overlay.open { display: block; }
        .drawer {
            position: fixed; top: 0; right: 0; bottom: 0;
            width: 720px; max-width: 100vw;
            background: white; box-shadow: -8px 0 24px rgba(0,0,0,0.12);
            transform: translateX(100%); transition: transform 0.18s;
            display: flex; flex-direction: column; z-index: 60;
        }
        .drawer.open { transform: translateX(0); }
        .drawer-header {
            padding: 14px 18px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
        }
        .drawer-header .meta { font-size: 12.5px; color: var(--text-muted); margin-top: 4px; }
        .drawer-header .tag-controls { display: flex; gap: 6px; margin-top: 8px; }
        .drawer-header .tag-controls button { font-size: 11px; padding: 3px 9px;
            border-radius: 999px; border: 1px solid var(--border); background: white; cursor: pointer; }
        .drawer-header .tag-controls button.active { border-color: var(--primary); background: var(--primary-light); }
        .drawer-body { flex: 1; overflow-y: auto; padding: 16px 18px;
            background: #fafbfc; display: flex; flex-direction: column; gap: 8px; }
        .drawer-footer {
            padding: 12px 18px; border-top: 1px solid var(--border); background: white;
            display: flex; gap: 8px; align-items: stretch;
        }
        .drawer-footer textarea {
            flex: 1; padding: 8px 10px; border: 1px solid var(--border); border-radius: 6px;
            font-size: 13px; font-family: inherit; resize: vertical; min-height: 60px;
        }

        .bubble {
            max-width: 78%; padding: 9px 12px; border-radius: 12px; font-size: 13.5px;
            line-height: 1.45; white-space: pre-wrap; word-wrap: break-word;
            position: relative;
        }
        .bubble.inbound { align-self: flex-end; background: var(--user-bubble); border-bottom-right-radius: 4px; }
        .bubble.inbound.client-llm { background: var(--client-llm-bubble); }
        .bubble.outbound { align-self: flex-start; background: var(--bot-bubble); border: 1px solid var(--border); border-bottom-left-radius: 4px; }
        .bubble.notice { align-self: center; background: var(--notice-bubble);
            border: 1px dashed rgba(245, 158, 11, 0.55); color: #92400e;
            font-size: 12px; max-width: 90%; }
        .bubble .row-meta { font-size: 10.5px; color: var(--text-muted); margin-top: 4px;
            display: flex; gap: 10px; align-items: center; }
        .bubble .annotate-btn {
            font-size: 11px; padding: 2px 8px; border-radius: 999px;
            border: 1px solid var(--border); background: white; cursor: pointer; }
        .bubble .annotate-btn:hover { background: var(--primary-light); border-color: var(--primary); }
        .annotation {
            margin: 4px 0 0 0; padding: 6px 9px; border-radius: 6px;
            font-size: 12px; background: #f8fafc; border-left: 3px solid var(--text-muted);
        }
        .annotation.warn { border-left-color: var(--warning); background: #fffbeb; }
        .annotation.error { border-left-color: var(--danger); background: #fee2e2; }
        .annotation .author { font-weight: 600; color: var(--text-main); }

        /* Compare modal */
        .compare-overlay {
            position: fixed; inset: 0; background: rgba(2, 8, 23, 0.6); display: none;
            z-index: 70; padding: 20px;
        }
        .compare-overlay.open { display: flex; }
        .compare-box {
            background: white; border-radius: 10px; flex: 1;
            display: flex; flex-direction: column; max-height: 100%; overflow: hidden;
        }
        .compare-header {
            padding: 14px 16px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
        }
        .compare-body {
            display: grid; gap: 12px; padding: 14px; overflow: auto; flex: 1;
        }
        .compare-col {
            border: 1px solid var(--border); border-radius: 8px; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .compare-col-head { padding: 10px 12px; background: #f1f5f9; font-size: 12.5px;
            color: var(--text-muted); border-bottom: 1px solid var(--border); }
        .compare-col-body { flex: 1; overflow-y: auto; padding: 10px;
            background: #fafbfc; display: flex; flex-direction: column; gap: 6px; }
    </style>
</head>

<body>
    <header>
        <h1>ProAlto · Revisión de pruebas del bot</h1>
        <a href="/admin/test">← Volver a Modo Test</a>
    </header>

    <main>
        <div class="toolbar">
            <label>Modo:
                <select id="filter-mode">
                    <option value="">Todos</option>
                    <option value="manual">Manual</option>
                    <option value="auto_flujos">Flujos (auto)</option>
                    <option value="auto_llm">LLM vs LLM</option>
                    <option value="auto">Auto (legacy)</option>
                </select>
            </label>
            <label>Persona:
                <select id="filter-persona">
                    <option value="">Todas</option>
                </select>
            </label>
            <label>Etiqueta:
                <select id="filter-tag">
                    <option value="">Todas</option>
                    <option value="ok">OK</option>
                    <option value="fail">Falla</option>
                    <option value="review">Revisar</option>
                </select>
            </label>
            <button id="btn-refresh">Refrescar</button>
            <div style="flex:1"></div>
            <span id="selected-count" style="font-size:12.5px;color:var(--text-muted);"></span>
            <button id="btn-compare" disabled class="primary">Comparar seleccionadas</button>
        </div>

        <div class="sessions-table">
            <table>
                <thead>
                    <tr>
                        <th style="width:30px;"></th>
                        <th>Fecha</th>
                        <th>Modo</th>
                        <th>Persona</th>
                        <th>Objetivo / Cliente</th>
                        <th>Turnos</th>
                        <th>Señales</th>
                        <th>Tag</th>
                    </tr>
                </thead>
                <tbody id="sessions-tbody">
                    <tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-muted);">Cargando…</td></tr>
                </tbody>
            </table>
        </div>
    </main>

    <!-- Drawer de detalle -->
    <div class="drawer-overlay" id="drawer-overlay"></div>
    <aside class="drawer" id="drawer">
        <div class="drawer-header">
            <div>
                <div style="font-weight:600;font-size:15px;" id="drawer-title">—</div>
                <div class="meta" id="drawer-meta">—</div>
                <div class="tag-controls" id="drawer-tags">
                    <button data-tag="ok">OK</button>
                    <button data-tag="fail">Falla</button>
                    <button data-tag="review">Revisar</button>
                    <button data-tag="">Sin tag</button>
                </div>
            </div>
            <button id="drawer-close" style="background:transparent;border:none;font-size:22px;cursor:pointer;">×</button>
        </div>
        <div class="drawer-body" id="drawer-body"></div>
        <div class="drawer-footer">
            <textarea id="drawer-note" placeholder="Anotación de sesión (Ctrl+Enter para guardar)…"></textarea>
            <div style="display:flex;flex-direction:column;gap:6px;">
                <select id="drawer-severity">
                    <option value="info">Info</option>
                    <option value="warn">Warning</option>
                    <option value="error">Error</option>
                </select>
                <button id="drawer-add-note" class="primary">Anotar sesión</button>
            </div>
        </div>
    </aside>

    <!-- Modal de comparación -->
    <div class="compare-overlay" id="compare-overlay">
        <div class="compare-box">
            <div class="compare-header">
                <div style="font-weight:600;">Comparación de sesiones</div>
                <button id="compare-close" style="background:transparent;border:none;font-size:22px;cursor:pointer;">×</button>
            </div>
            <div class="compare-body" id="compare-body"></div>
        </div>
    </div>

    <script>
        const state = {
            sessions: [],
            personas: [],
            selected: new Set(),  // ids
            openSessionId: null,
            openSessionMessages: [],
        };

        async function loadPersonas() {
            try {
                const res = await fetch('/admin/api/test/personas');
                const data = await res.json();
                if (data.status !== 'ok') return;
                state.personas = data.personas || [];
                const sel = document.getElementById('filter-persona');
                state.personas.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.slug;
                    opt.textContent = p.nombre;
                    sel.appendChild(opt);
                });
            } catch (e) { console.error(e); }
        }

        async function loadSessions() {
            const params = new URLSearchParams();
            const mode = document.getElementById('filter-mode').value;
            const persona = document.getElementById('filter-persona').value;
            const tag = document.getElementById('filter-tag').value;
            if (mode) params.set('mode', mode);
            if (persona) params.set('persona', persona);
            if (tag) params.set('tag', tag);
            params.set('limit', '100');

            const tbody = document.getElementById('sessions-tbody');
            tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-muted);">Cargando…</td></tr>';

            try {
                const res = await fetch('/admin/api/test/sessions?' + params.toString());
                const data = await res.json();
                if (data.status !== 'ok') {
                    tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--danger);">Error cargando</td></tr>';
                    return;
                }
                state.sessions = data.sessions || [];
                renderSessions();
            } catch (e) {
                console.error(e);
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--danger);">Error de red</td></tr>';
            }
        }

        function renderSessions() {
            const tbody = document.getElementById('sessions-tbody');
            if (!state.sessions.length) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:30px;color:var(--text-muted);">No hay sesiones que coincidan con los filtros.</td></tr>';
                return;
            }
            tbody.innerHTML = '';
            state.sessions.forEach(s => {
                const tr = document.createElement('tr');
                tr.className = 'row';
                tr.dataset.sessionId = s.id;

                // checkbox cell
                const tdCk = document.createElement('td');
                const ck = document.createElement('input');
                ck.type = 'checkbox';
                ck.checked = state.selected.has(s.id);
                ck.addEventListener('click', (e) => e.stopPropagation());
                ck.addEventListener('change', () => {
                    if (ck.checked) {
                        if (state.selected.size >= 3) {
                            ck.checked = false;
                            return;
                        }
                        state.selected.add(s.id);
                    } else {
                        state.selected.delete(s.id);
                    }
                    updateSelectedCount();
                });
                tdCk.appendChild(ck);
                tr.appendChild(tdCk);

                const fecha = s.created_at ? new Date(s.created_at).toLocaleString('es-CO') : '—';
                const objetivo = s.objetivo || s.client_name || '—';
                const personaNombre = s.persona_slug
                    ? (state.personas.find(p => p.slug === s.persona_slug)?.nombre || s.persona_slug)
                    : '—';
                const signals = (s.signals_emitted || []).slice(0, 4).map(sg =>
                    `<span class="signal-pill">${sg}</span>`).join('');
                const tagHtml = s.tag
                    ? `<span class="tag-pill tag-${s.tag}">${s.tag}</span>`
                    : '<span style="color:var(--text-muted);">—</span>';

                tr.insertAdjacentHTML('beforeend', `
                    <td>${fecha}</td>
                    <td>${modeLabel(s.mode)}</td>
                    <td>${personaNombre}</td>
                    <td class="truncate" title="${escapeHtml(objetivo)}">${escapeHtml(objetivo)}</td>
                    <td>${s.num_turns || 0}</td>
                    <td>${signals || '<span style="color:var(--text-muted);">—</span>'}</td>
                    <td>${tagHtml}</td>
                `);
                tr.addEventListener('click', () => openDrawer(s.id));
                tbody.appendChild(tr);
            });
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const el = document.getElementById('selected-count');
            const btn = document.getElementById('btn-compare');
            const n = state.selected.size;
            el.textContent = n > 0 ? `${n} seleccionada${n > 1 ? 's' : ''}` : '';
            btn.disabled = n < 2;
        }

        function escapeHtml(s) {
            return String(s ?? '').replace(/[&<>"]/g, c => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;'
            })[c]);
        }

        // Etiqueta legible del modo de la sesión.
        function modeLabel(m) {
            switch (m) {
                case 'auto_llm': return 'LLM vs LLM';
                case 'auto_flujos': return 'Flujos (auto)';
                case 'auto': return 'Auto';
                case 'manual': return 'Manual';
                default: return m || '—';
            }
        }

        function isAutoMode(m) {
            return typeof m === 'string' && m.startsWith('auto');
        }

        // ── Drawer ─────────────────────────────────────────────────────

        async function openDrawer(sessionId) {
            state.openSessionId = sessionId;
            const overlay = document.getElementById('drawer-overlay');
            const drawer = document.getElementById('drawer');
            overlay.classList.add('open');
            drawer.classList.add('open');
            document.getElementById('drawer-title').textContent = 'Cargando…';
            document.getElementById('drawer-body').innerHTML = '';
            document.getElementById('drawer-meta').textContent = '';

            try {
                const res = await fetch(`/admin/api/test/sessions/${sessionId}`);
                const data = await res.json();
                if (data.status !== 'ok') {
                    document.getElementById('drawer-body').innerHTML = '<div style="color:var(--danger);">Error cargando</div>';
                    return;
                }
                renderDrawer(data);
            } catch (e) {
                console.error(e);
                document.getElementById('drawer-body').innerHTML = '<div style="color:var(--danger);">Error de red</div>';
            }
        }

        function closeDrawer() {
            document.getElementById('drawer-overlay').classList.remove('open');
            document.getElementById('drawer').classList.remove('open');
            state.openSessionId = null;
            state.openSessionMessages = [];
        }

        function renderDrawer(detail) {
            const s = detail.session;
            const msgs = detail.messages || [];
            const anns = detail.annotations || [];
            state.openSessionMessages = msgs;

            const personaName = s.persona_slug
                ? (state.personas.find(p => p.slug === s.persona_slug)?.nombre || s.persona_slug)
                : '—';
            document.getElementById('drawer-title').textContent =
                `${isAutoMode(s.mode) ? modeLabel(s.mode) + ' · ' + personaName : 'Manual · ' + (s.client_name || s.test_phone)}`;
            const fecha = s.created_at ? new Date(s.created_at).toLocaleString('es-CO') : '—';
            const objetivo = s.objetivo ? ` · ${s.objetivo}` : '';
            const ced = s.cedula_used ? ` · Cédula: ${s.cedula_used}` : '';
            document.getElementById('drawer-meta').textContent =
                `${fecha} · ${s.num_turns || 0} turnos${objetivo}${ced}`;

            // Tag buttons
            document.querySelectorAll('#drawer-tags button').forEach(b => {
                b.classList.toggle('active', (b.dataset.tag || '') === (s.tag || ''));
            });

            // Body
            const body = document.getElementById('drawer-body');
            body.innerHTML = '';
            const annsByMsg = {};
            anns.forEach(a => {
                if (a.message_id) {
                    (annsByMsg[a.message_id] ||= []).push(a);
                }
            });
            const sessionAnns = anns.filter(a => !a.message_id);

            // Session-level annotations primero
            if (s.notes) {
                const div = document.createElement('div');
                div.className = 'annotation';
                div.innerHTML = `<span class="author">Nota de sesión:</span> ${escapeHtml(s.notes)}`;
                body.appendChild(div);
            }
            sessionAnns.forEach(a => body.appendChild(renderAnnotation(a)));

            msgs.forEach(m => body.appendChild(renderMessageBubble(m, annsByMsg[m.id] || [])));
        }

        function renderMessageBubble(m, anns) {
            const wrap = document.createElement('div');
            const bubble = document.createElement('div');
            bubble.className = 'bubble ' + m.direction;
            if (m.role === 'client_llm') bubble.classList.add('client-llm');
            if (m.role === 'notice') {
                bubble.classList.remove('inbound', 'outbound');
                bubble.classList.add('notice');
            }
            bubble.textContent = m.text || '';
            const meta = document.createElement('div');
            meta.className = 'row-meta';
            const parts = [`#${m.seq}`, m.role];
            if (m.latency_ms) parts.push(`${m.latency_ms}ms`);
            if (m.signals && m.signals.length) parts.push(m.signals.join(', '));
            meta.textContent = parts.join(' · ');
            if (m.direction === 'outbound' && m.role === 'assistant') {
                const btn = document.createElement('button');
                btn.className = 'annotate-btn';
                btn.textContent = '+ anotar';
                btn.addEventListener('click', () => promptAnnotation(m.id));
                meta.appendChild(btn);
            }
            bubble.appendChild(meta);
            wrap.appendChild(bubble);
            anns.forEach(a => wrap.appendChild(renderAnnotation(a)));
            return wrap;
        }

        function renderAnnotation(a) {
            const div = document.createElement('div');
            div.className = 'annotation ' + (a.severity || 'info');
            div.innerHTML = `<span class="author">${escapeHtml(a.author || 'admin')}:</span> ${escapeHtml(a.note)}`;
            return div;
        }

        async function promptAnnotation(messageId) {
            const note = prompt('Anotación (texto):');
            if (!note) return;
            const severity = prompt('Severidad (info | warn | error):', 'warn');
            try {
                const res = await fetch(`/admin/api/test/sessions/${state.openSessionId}/annotate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note, severity, message_id: messageId }),
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    openDrawer(state.openSessionId);
                }
            } catch (e) { console.error(e); }
        }

        async function addSessionAnnotation() {
            const note = document.getElementById('drawer-note').value.trim();
            const severity = document.getElementById('drawer-severity').value;
            if (!note || !state.openSessionId) return;
            try {
                const res = await fetch(`/admin/api/test/sessions/${state.openSessionId}/annotate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note, severity }),
                });
                const data = await res.json();
                if (data.status === 'ok') {
                    document.getElementById('drawer-note').value = '';
                    openDrawer(state.openSessionId);
                }
            } catch (e) { console.error(e); }
        }

        async function setSessionTag(tag) {
            if (!state.openSessionId) return;
            try {
                const res = await fetch(`/admin/api/test/sessions/${state.openSessionId}/tag`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tag: tag || null }),
                });
                if ((await res.json()).status === 'ok') {
                    document.querySelectorAll('#drawer-tags button').forEach(b => {
                        b.classList.toggle('active', (b.dataset.tag || '') === (tag || ''));
                    });
                    // refresca lista
                    loadSessions();
                }
            } catch (e) { console.error(e); }
        }

        // ── Comparación ────────────────────────────────────────────────

        async function openCompare() {
            const ids = Array.from(state.selected).slice(0, 3);
            if (ids.length < 2) return;
            const overlay = document.getElementById('compare-overlay');
            overlay.classList.add('open');
            const body = document.getElementById('compare-body');
            body.innerHTML = '<div style="padding:20px;">Cargando…</div>';
            try {
                const res = await fetch('/admin/api/test/compare?ids=' + ids.join(','));
                const data = await res.json();
                if (data.status !== 'ok') {
                    body.innerHTML = '<div style="color:var(--danger);padding:20px;">Error</div>';
                    return;
                }
                renderCompare(data.sessions || []);
            } catch (e) {
                console.error(e);
                body.innerHTML = '<div style="color:var(--danger);padding:20px;">Error de red</div>';
            }
        }

        function renderCompare(sessions) {
            const body = document.getElementById('compare-body');
            body.style.gridTemplateColumns = `repeat(${sessions.length}, 1fr)`;
            body.innerHTML = '';
            sessions.forEach(detail => {
                const s = detail.session;
                const col = document.createElement('div');
                col.className = 'compare-col';
                const fecha = s.created_at ? new Date(s.created_at).toLocaleString('es-CO') : '—';
                const personaName = s.persona_slug
                    ? (state.personas.find(p => p.slug === s.persona_slug)?.nombre || s.persona_slug)
                    : '—';
                col.innerHTML = `
                    <div class="compare-col-head">
                        <strong>${escapeHtml(modeLabel(s.mode))} · ${escapeHtml(personaName)}</strong><br>
                        <small>${fecha} · ${s.num_turns || 0} turnos</small>
                    </div>
                    <div class="compare-col-body"></div>
                `;
                const colBody = col.querySelector('.compare-col-body');
                (detail.messages || []).forEach(m => {
                    const b = document.createElement('div');
                    b.className = 'bubble ' + m.direction;
                    if (m.role === 'client_llm') b.classList.add('client-llm');
                    if (m.role === 'notice') {
                        b.classList.remove('inbound', 'outbound');
                        b.classList.add('notice');
                    }
                    b.textContent = m.text || '';
                    colBody.appendChild(b);
                });
                body.appendChild(col);
            });
        }

        function closeCompare() {
            document.getElementById('compare-overlay').classList.remove('open');
        }

        // ── Wire up ────────────────────────────────────────────────────

        document.getElementById('btn-refresh').addEventListener('click', loadSessions);
        document.getElementById('filter-mode').addEventListener('change', loadSessions);
        document.getElementById('filter-persona').addEventListener('change', loadSessions);
        document.getElementById('filter-tag').addEventListener('change', loadSessions);
        document.getElementById('drawer-close').addEventListener('click', closeDrawer);
        document.getElementById('drawer-overlay').addEventListener('click', closeDrawer);
        document.getElementById('drawer-add-note').addEventListener('click', addSessionAnnotation);
        document.getElementById('drawer-note').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') addSessionAnnotation();
        });
        document.querySelectorAll('#drawer-tags button').forEach(b => {
            b.addEventListener('click', () => setSessionTag(b.dataset.tag || null));
        });
        document.getElementById('btn-compare').addEventListener('click', openCompare);
        document.getElementById('compare-close').addEventListener('click', closeCompare);

        // Carga inicial
        (async () => {
            await loadPersonas();
            await loadSessions();
        })();
    </script>
</body>

</html>
